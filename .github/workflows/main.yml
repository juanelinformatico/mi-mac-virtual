name: Entorno macOS Tahoe - Reparado Total

on: 
  workflow_dispatch: 

jobs:
  arrancar-mac:
    runs-on: macos-15 
    
    steps:
    - name: 1. Descargar Ngrok Oficial para Mac
      run: |
        echo "=== Descargando Ngrok Puro ==="
        # Descarga directa del binario zip oficial de Ngrok para macOS Intel/Apple Silicon
        curl -sL "https://bin.equinox.io/c/bNyj1mQcaMx/ngrok-v3-stable-darwin-amd64.zip" -o ngrok.zip
        unzip -o ngrok.zip
        chmod +x ngrok
        # Lo movemos a una ruta donde macOS no pida permisos especiales de seguridad
        mkdir -p $HOME/bin
        mv ngrok $HOME/bin/
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: 2. Configurar Token
      run: |
        if [ -z "${{ secrets.NGROK_AUTH_TOKEN }}" ]; then
          echo "Falta el secreto NGROK_AUTH_TOKEN en Settings."
          exit 1
        fi
        $HOME/bin/ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: 3. Habilitar SSH Nativo de Apple
      run: |
        echo "=== Encendiendo el SSH que viene en la Mac ==="
        # Activamos el servicio de login remoto oficial del sistema operativo
        sudo systemsetup -setremotelogin on
        # Le ponemos una contraseña fija al usuario runner para que puedas entrar
        sudo dscl . -passwd /Users/runner "12345"

    - name: 4. Abrir Túnel TCP
      run: |
        echo "=== Abriendo túnel TCP en el puerto 22 ==="
        # Nota: Si tu cuenta de Ngrok es totalmente nueva, este comando podría pedirte verificar una tarjeta en su web.
        # Es la única forma de conectar por SSH real en Mac.
        $HOME/bin/ngrok tcp 22 --log=stdout > /dev/null 2>&1 &
        sleep 5

    - name: 5. Sistema Listo
      run: |
        echo "=========================================================="
        echo " Entorno encendido correctamente."
        echo "=========================================================="
        echo "1. Ve a: https://dashboard.ngrok.com/endpoints/status"
        echo "2. Copia la dirección TCP (Ejemplo: tcp://0.tcp.ngrok.io:12345)"
        echo "3. Conéctate desde la terminal de tu PC usando la clave 12345:"
        echo "   ssh runner@0.tcp.ngrok.io -p 12345"
        echo "=========================================================="
        
        while true; do sleep 60; done
