name: Entorno macOS Tahoe - Ultra Resistente

on: 
  workflow_dispatch: # Activación manual con el botón "Run workflow"

jobs:
  arrancar-mac:
    runs-on: macos-15 # El sistema base oficial de GitHub
    
    steps:
    - name: 1. Descargar Herramientas Usando Canales Oficiales
      run: |
        echo "=== Instalando Ngrok vía Script Oficial ==="
        # Usamos el instalador oficial de ngrok por comando, que nunca cambia de URL
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        # Si falla el método de arriba, descargamos el paquete nativo oficial de macOS
        curl -sL https://bin.equinox.io/c/bNyj1mQcaMx/ngrok-v3-stable-darwin-amd64.zip -o ngrok.zip || curl -sL https://bin.equinox.io/c/bNyj1mQcaMx/ngrok-v3-stable-darwin-arm64.zip -o ngrok.zip
        unzip -o ngrok.zip
        chmod +x ngrok
        sudo mv ngrok /usr/local/bin/
        rm ngrok.zip

        echo "=== Instalando Terminal Web vía NPM (Canal Seguro) ==="
        # Usamos npm (el gestor de paquetes de Node.js) que ya viene instalado en GitHub y es 100% confiable
        sudo npm install -g web-terminal

    - name: 2. Enlazar con tu Cuenta de Ngrok
      run: |
        if [ -z "${{ secrets.NGROK_AUTH_TOKEN }}" ]; then
          echo "=========================================================="
          echo "❌ ERROR: No has guardado tu NGROK_AUTH_TOKEN en GitHub."
          echo "Ve a Settings > Secrets and variables > Actions para añadirlo."
          echo "=========================================================="
          exit 1
        fi
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: 3. Lanzar Consola Segura en Puerto Web
      run: |
        echo "=== Iniciando consola web ==="
        # Iniciamos la terminal web en el puerto 8080 en segundo plano
        web-terminal --port 8080 &
        sleep 3

        echo "=== Abriendo túnel seguro de Ngrok ==="
        # Abrimos el túnel HTTP clásico (Gratis y sin tarjeta)
        ngrok http 8080 --log=stdout > /dev/null 2>&1 &
        sleep 5

    - name: 4. Entorno Listo
      run: |
        echo "=========================================================="
        echo " 🎉 ¡ENTORNO MACOS ACTIVO Y CONFIGURADO! 🎉"
        echo "=========================================================="
        echo "1. Entra a tu panel: https://dashboard.ngrok.com/endpoints/status"
        echo "2. Abre el enlace '.ngrok-free.app' en tu navegador."
        echo "3. ¡Ya estás dentro! Esta terminal entra directo sin contraseña."
        echo "=========================================================="
        echo "Tiempo límite de la sesión: 6 horas."
        
        # Mantiene viva la máquina sin consumir CPU
        while true; do sleep 60; done
